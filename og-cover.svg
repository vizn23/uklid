<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Michaela Dušková – Úklid &amp; Údržba</title>
  <desc id="desc">Náhledový vizuál pro sdílení landing page úklidových, zahradních a údržbářských služeb.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbf8f2" />
      <stop offset="100%" stop-color="#eef7f0" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d8c4e" />
      <stop offset="100%" stop-color="#54a66e" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="110" cy="90" r="140" fill="#f4b866" fill-opacity="0.18" />
  <circle cx="1010" cy="120" r="170" fill="#2d8c4e" fill-opacity="0.12" />
  <circle cx="1030" cy="560" r="190" fill="#2d8c4e" fill-opacity="0.09" />

  <rect x="72" y="68" width="156" height="156" rx="44" fill="url(#accent)" />
  <text x="150" y="165" text-anchor="middle" font-family="Manrope, Arial, sans-serif" font-size="72" font-weight="800" fill="#ffffff">MD</text>

  <text x="72" y="314" font-family="Fraunces, Georgia, serif" font-size="68" font-weight="600" fill="#1d2a23">
    Michaela Dušková
  </text>
  <text x="72" y="388" font-family="Fraunces, Georgia, serif" font-size="64" font-weight="500" fill="#1d2a23">
