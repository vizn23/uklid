  </text>

  <rect x="72" y="502" width="360" height="72" rx="36" fill="#1d2a23" fill-opacity="0.92" />
  <text x="252" y="548" text-anchor="middle" font-family="Manrope, Arial, sans-serif" font-size="28" font-weight="800" fill="#ffffff">
    duskova-uklid.cz
  </text>

  <rect x="866" y="220" width="238" height="118" rx="32" fill="#ffffff" fill-opacity="0.92" />
  <text x="900" y="266" font-family="Manrope, Arial, sans-serif" font-size="22" font-weight="700" fill="#526057">Domácnosti</text>
  <text x="900" y="304" font-family="Manrope, Arial, sans-serif" font-size="28" font-weight="800" fill="#1d2a23">Úklid bez starostí</text>

  <rect x="806" y="364" width="298" height="112" rx="32" fill="#eff8f1" />
  <text x="842" y="408" font-family="Manrope, Arial, sans-serif" font-size="22" font-weight="700" fill="#526057">Zahrada a údržba</text>
  <text x="842" y="446" font-family="Manrope, Arial, sans-serif" font-size="28" font-weight="800" fill="#1d2a23">Vše jedním telefonátem</text>
